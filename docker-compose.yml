services:
  sam-media-api:
    build: .
    container_name: sam-media-api
    restart: unless-stopped
    ports:
      - "8765:8000"   # 0.0.0.0 binding so qBittorrent can call us via 172.17.0.1:8765
    env_file:
      - .env
    volumes:
      - /srv/downloads:/downloads                           # shared with qBittorrent — rename files here
      - /mnt/cloud/gdrive/Media:/mnt/cloud/gdrive/Media    # rclone FUSE mount = gdrive = Jellyfin library
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - jackett
    networks:
      - internal

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    restart: unless-stopped
    ports:
      - "127.0.0.1:9117:9117"   # UI on localhost only (use SSH tunnel to access)
    volumes:
      - jackett_config:/config
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - flaresolverr
    networks:
      - internal

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
    networks:
      - internal

  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    restart: unless-stopped
    ports:
      - "127.0.0.1:5030:5030"   # Web UI (use SSH tunnel to access)
      - "0.0.0.0:5031:5031"     # API (reachable from sam-media-api via 172.17.0.1:5031)
      - "0.0.0.0:2234:2234/tcp" # Soulseek P2P (must be open to internet)
    volumes:
      - /root/apps/slskd/slskd.yml:/app/slskd.yml:ro
      - slskd_data:/app/data
      - /mnt/cloud/gdrive/Media/Music/Downloads:/mnt/cloud/gdrive/Media/Music/Downloads
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  jackett_config:
  slskd_data:
